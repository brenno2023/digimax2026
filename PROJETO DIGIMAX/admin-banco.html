<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin Banco - Digimax</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    h1 {
      color: #222;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      width: 230px;
    }

    .card h2 {
      margin: 0;
      font-size: 18px;
      color: #444;
    }

    .card button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .card button:hover {
      background: #374151;
    }

    .resultado {
  margin-top: 20px;
}

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background: #111827;
      color: white;
      padding: 10px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f1f1f1;
    }
  </style>
</head>

<body>

  <h1>Painel Banco de Dados - Digimax</h1>

  <div class="cards">

    <div class="card">
      <h2>View Orçamentos</h2>
      <button onclick="carregarDados('/admin-bd/view-orcamentos')">
        Consultar
      </button>
    </div>

    <div class="card">
      <h2>Function Orçamentos</h2>
      <button onclick="carregarDados('/admin-bd/function-orcamentos')">
        Executar
      </button>
    </div>

    <div class="card">
      <h2>Procedure Funcionário</h2>
      <button onclick="carregarDados('/admin-bd/procedure-funcionario')">
        Executar
      </button>
    </div>

    <div class="card">
    <h2>Executar Trigger</h2>
    <button onclick="executarTrigger()">
        Executar
    </button>
</div>

<div class="card">
    <h2>Histórico Trigger</h2>
    <button onclick="carregarDados('/admin-bd/trigger-orcamento')">
        Consultar
    </button>
</div>

  </div>

  <div class="resultado">
    <h2 id="titulo">Resultado</h2>
    <div id="conteudo">
      Clique em uma opção acima.
    </div>
  </div>

  <script>
    const API = "http://localhost:8080";

    async function carregarDados(rota) {
      const conteudo = document.getElementById("conteudo");
      conteudo.innerHTML = "Carregando...";

      try {
        const resposta = await fetch(API + rota);
        const dados = await resposta.json();

        if (!dados || dados.length === 0) {
          conteudo.innerHTML = "Nenhum dado encontrado.";
          return;
        }

        montarTabela(dados);

      } catch (erro) {
        conteudo.innerHTML = "Erro ao buscar dados do back-end.";
        console.error(erro);
      }
    }

    function montarTabela(dados) {
      const conteudo = document.getElementById("conteudo");

      const colunas = Object.keys(dados[0]);

      let html = "<table><thead><tr>";

      colunas.forEach(coluna => {
        html += `<th>${coluna}</th>`;
      });

      html += "</tr></thead><tbody>";

      dados.forEach(item => {
        html += "<tr>";

        colunas.forEach(coluna => {
          html += `<td>${item[coluna] ?? ""}</td>`;
        });

        html += "</tr>";
      });

      html += "</tbody></table>";

      conteudo.innerHTML = html;
    }
  </script>

</body>
</html>
